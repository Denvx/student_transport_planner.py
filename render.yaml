services:
  # ── Back-end Flask ──────────────────────────────────────────────
  - type: web
    name: student-transport-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app 
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── Front-end estático ────────────────────────────────────────── 
  - type: web
    name: student-transport-frontend
    runtime: static
    rootDir: frontend
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html